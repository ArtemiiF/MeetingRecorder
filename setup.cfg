[mutmut]
# Mutate only the pure-logic core (backend_core.py) — mutmut re-runs the WHOLE
# selected test suite per mutant, so this is only tractable against the fast,
# mock-free tests in tests/test_backend_core.py (see that file's own docstring
# and CLAUDE.md). Run with the project venv so mutmut's in-process pytest.main()
# resolves the same interpreter/deps as `npm run test:py`:
#   ../venv/bin/python -m pip install -r requirements-dev.txt
#   ../venv/bin/python -m mutmut run
#   ../venv/bin/python -m mutmut results
source_paths=backend_core.py
pytest_add_cli_args_test_selection=tests/test_backend_core.py
