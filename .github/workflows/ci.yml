name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  js-tests:
    name: js-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:js

  py-tests:
    name: py-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      # ffmpeg is a system binary (not a pip dep): cmd_mix / cmd_preflight
      # guard on `shutil.which("ffmpeg")`. subprocess.run is mocked in the
      # tests, so ffmpeg is never executed — it only has to be on PATH, or 7
      # mix/preflight tests bail early and fail. Present on the dev machine
      # (system install), absent on a clean ubuntu runner.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # Call pytest directly (not `npm run test:py`, which hardcodes
      # ../venv/bin/python — a local dev-machine venv path that doesn't
      # exist in CI).
      - run: python -m pytest tests/ -q

  # Report-only mutation testing against backend_core.py's pure-logic core
  # (setup.cfg's [mutmut] section scopes mutants to that one file and the
  # runner to tests/test_backend_core.py's fast, mock-free suite — mutmut
  # re-runs the WHOLE selected suite per mutant, so whole-suite-per-mutant is
  # only tractable against that fast subset, not the full mocked test_backend.py).
  # ~34s / 829 mutants locally — continue-on-error: true — this job is
  # visibility, not a merge gate (score ~93.6% as of chore/tails-batch, above
  # the 85% Kalnitsky reference), until the owner decides to make it required.
  mutation:
    name: mutation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m mutmut run
        continue-on-error: true
      - run: python -m mutmut results

  # Report-only mutation testing against lib/mainutil.js (deferred from PR
  # #33 — see stryker.conf.json). No native node:test StrykerJS plugin exists,
  # so this uses the command test runner invoking `node --test
  # tests/mainutil.test.js` directly (NOT `npm run test:js`, which also runs
  # the much larger tests/renderer.test.js and would make whole-suite-per-
  # mutant mutation testing far slower). ~40s / 806 mutants locally, score
  # ~86% — continue-on-error: true, same non-gating stance as the Python
  # `mutation` job above, until the owner decides to raise the bar.
  # JS-мутационка (StrykerJS, stryker.conf.json): scoped to lib/mainutil.js,
  # command-runner `node --test tests/mainutil.test.js` ONLY — не npm run test:js,
  # который тянет куда более тяжёлый renderer.test.js и делает whole-suite-per-mutant
  # неподъёмным (native node:test-плагина у Stryker нет). ignorePatterns режет dist/
  # (~1.5GB --dir-артефакт) из sandbox-копии. ~40s / 806 mutants, скор ~86% на
  # первом замере. Report-only (continue-on-error, не в needs релиза) — как mutation.
  mutation-js:
    name: mutation-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx stryker run
        continue-on-error: true

  # Boot-smoke against the PACKAGED app (--dir build), not the dev checkout —
  # catches the whole "asar-packaging drops/misroutes a runtime path, main
  # process crashes at require-time before any window appears" bug class
  # (v1.4.5: events.json missing from the asar; 903 unit/integration tests
  # stayed green because none of them ever launch the real .app). Parallel to
  # js-tests/py-tests, not required by them.
  e2e-boot:
    name: e2e-boot
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx electron-builder --mac --arm64 --dir
      - run: npm run test:e2e

  # Only meaningful on push to main: decides whether package.json's version
  # is new (no matching GitHub release yet) and therefore whether the
  # release job below should run.
  check-version:
    name: check-version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - name: Check whether the release tag already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # Runs only after js-tests + py-tests + check-version all succeed, on a
  # push to main, and only when the version was bumped (no existing release
  # tag) — i.e. merge → tests re-run → release only if green and versioned.
  release:
    name: release
    runs-on: macos-latest
    needs: [js-tests, py-tests, check-version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --publish never: the gh CLI step below is the sole publisher.
      # electron-builder 26.x otherwise reads GH_TOKEN and may auto-publish
      # to a pre-existing draft (default policy onTagOrDraft).
      - run: npx electron-builder --mac --arm64 --publish never
      - name: Create GitHub release
        run: |
          tag="v${{ needs.check-version.outputs.version }}"
          gh release create "$tag" dist/*.dmg dist/*.zip --target main --title "$tag" --generate-notes
